<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Interactive graph view of all blog posts and their connections — Neel Mishra">
  <title>Graph View | Neel Mishra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Playfair+Display:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="blog.css">
  <style>
    .graph-full-page {
      width: 100%;
      height: calc(100vh - 60px);
      position: relative;
      overflow: hidden;
    }
    #graph-canvas-full {
      width: 100%;
      height: 100%;
      cursor: grab;
      background: radial-gradient(circle at 50% 50%, rgba(10,143,106,0.03) 0%, transparent 70%),
                  var(--bg);
    }
    .graph-toolbar {
      position: absolute;
      top: 1rem;
      left: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 10;
    }
    .graph-toolbar a,
    .graph-toolbar .graph-info {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 0.9rem;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(255,250,242,0.92);
      backdrop-filter: blur(8px);
      text-decoration: none;
      color: var(--ink);
      font-weight: 600;
      font-size: 0.88rem;
      transition: border-color 0.2s;
    }
    .graph-toolbar a:hover { border-color: var(--brand); }
    .graph-info { color: var(--ink-muted); font-weight: 400; }
    .graph-legend {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      display: flex;
      gap: 1rem;
      padding: 0.5rem 0.9rem;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(255,250,242,0.92);
      backdrop-filter: blur(8px);
      font-size: 0.82rem;
      color: var(--ink-muted);
      z-index: 10;
    }
    .graph-legend span {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">Neel Mishra</a>
    <nav class="nav-links" aria-label="Primary">
      <a href="index.html">Home</a>
      <a href="experience.html">Experience</a>
      <a href="projects.html">Projects</a>
      <a href="blog.html">Blog</a>
      <a href="graph.html" class="active">Graph</a>
      <a href="index.html#contact">Contact</a>
    </nav>
  </header>

  <div class="graph-full-page">
    <canvas id="graph-canvas-full"></canvas>
    <div class="graph-toolbar">
      <a href="blog.html">&#8592; Back to Blog</a>
      <div class="graph-info">Double-click a node to open the post. Scroll to zoom. Drag to pan or move nodes.</div>
    </div>
    <div class="graph-legend">
      <span><span class="legend-dot" style="background:#0a8f6a"></span> C++ STL Series</span>
      <span><span class="legend-dot" style="background:#ff6b35"></span> C++ Deep Dives</span>
    </div>
  </div>

  <script src="blog.js"></script>
  <script src="graph.js"></script>
</body>
</html>
